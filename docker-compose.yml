services: 
  db-server:
    image: mysql:8.0
    env_file: 
      - .env
    ports:
      - "3307:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./mysql_data:/var/lib/mysql
  web-app:
    build: ./backend 
    ports:
      - "8080:8080"
    container_name: springboot_web_app
    env_file: 
      - .env
    depends_on:
      - db-server
  frontend:
    build: ./frontend
    container_name: react_frontend
    ports:
      - "5173:5173"
    stdin_open: true 
    depends_on:
      - web-app